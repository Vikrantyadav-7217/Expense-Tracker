<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
  
   
</head>
<body>


<div id="hero">
  <div class="hero-top">
    <div>
      <div class="hero-title">💰 Expense Tracker</div>
      <div class="hero-subtitle" id="month-label">Loading...</div>
    </div>
    <button class="toggle-btn" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
  </div>
  <div class="hero-cards">
    <div class="hcard">
      <div class="hcard-label">🛍 Shopping</div>
      <div class="hcard-val shopping" id="sum-shopping">₹0</div>
    </div>
    <div class="hcard">
      <div class="hcard-label">🍔 Food</div>
      <div class="hcard-val food" id="sum-food">₹0</div>
    </div>
    <div class="hcard">
      <div class="hcard-label">✈️ Travel</div>
      <div class="hcard-val travel" id="sum-travel">₹0</div>
    </div>
  </div>
  <div class="bg-badge" id="bg-badge">🍔 Food mode</div>
</div>


<div class="main">


  <div style="display:flex;flex-direction:column;gap:20px;">

    
    <div class="panel">
      <div class="panel-header"><span>➕ Add Expense</span></div>
      <div class="form-body">
        <div>
          <label>Description</label>
          <input type="text" id="desc" placeholder="e.g. Netflix, Groceries..." maxlength="60"/>
        </div>
        <div>
          <label>Amount (₹)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <div>
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
        <div>
          <label>Category</label>
          <div class="cat-grid">
            <button class="cat-btn food active" onclick="selectCat('food')" id="cat-food">
              <span class="icon">🍔</span> Food
            </button>
            <button class="cat-btn shopping" onclick="selectCat('shopping')" id="cat-shopping">
              <span class="icon">🛍</span> Shopping
            </button>
            <button class="cat-btn travel" onclick="selectCat('travel')" id="cat-travel">
              <span class="icon">✈️</span> Travel
            </button>
          </div>
        </div>
        <button class="add-btn" onclick="addExpense()">Add Expense</button>
        <div id="err-msg" style="color:#e53935;font-size:13px;display:none;"></div>
      </div>
    </div>

  
    <div class="panel">
      <div class="panel-header">
        <span>📋 Expenses</span>
        <span id="list-count" style="font-size:12px;color:var(--text2);font-weight:400;"></span>
      </div>
      <div class="month-bar">
        <label style="margin:0;font-size:13px;">Month:</label>
        <select id="filter-month" onchange="renderAll()"></select>
        <span class="month-total" id="filter-total">₹0 total</span>
      </div>
      <div class="expense-list" id="expense-list"></div>
    </div>
  </div>

  
  <div class="right-col">
    <div class="panel">
      <div class="panel-header">📊 Spending Breakdown</div>
      <div class="chart-wrap"><canvas id="donut-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-header">📅 Monthly Overview</div>
      <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-header">📆 Category Totals (Selected Month)</div>
      <div style="padding:12px 16px;">
        <table class="month-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>Count</th>
              <th style="text-align:right;">Total</th>
              <th style="text-align:right;">%</th>
            </tr>
          </thead>
          <tbody id="cat-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>


</body>
</html>
